stages:
  - trigger_circleci
  - build-bundle
  - scan-images
variables:
  APP_REGISTRY_PATH: $CI_REGISTRY_IMAGE
  FRONTEND_IMAGE: "$CI_REGISTRY_IMAGE/frontend"
  BACKEND_IMAGE: "$CI_REGISTRY_IMAGE/backend"
  EXPORTER_IMAGE: "$CI_REGISTRY_IMAGE/exporter"
  CURRENT_USER_ID: "1000"

# ============================================================== #
trigger_circleci_pipeline:
  stage: trigger_circleci
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Triggering CircleCI pipeline..."
    - |
      curl -X POST "https://circleci.com/api/v2/project/gitlab/penpo-lacapsule/penpot/pipeline" \
      -H "Circle-Token: $CIRCLECI_TOKEN" \
      -H "Content-Type: application/json" \
      -d '{"branch": "'"$CI_COMMIT_REF_NAME"'"}'

# ==============================================================

bundle-frontend:
  stage: build-bundle
  image: docker:29
  tags: [penpotv4]
  before_script:
    - apk add --no-cache bash rsync
    - docker volume rm ${DEVENV_PNAME}_user_data || true
    - docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
  script:
    - ./manage.sh build-frontend-bundle
    - ./manage.sh build-frontend-docker-image
    - docker tag penpotapp/frontend:latest "$FRONTEND_IMAGE:latest"
    - docker push "$FRONTEND_IMAGE:latest" 
# ==============================================================
bundle-backend:
  stage: build-bundle
  image: docker:29
  tags: [penpotv4]
  before_script:
    - apk add --no-cache bash rsync
    - docker volume rm ${DEVENV_PNAME}_user_data || true
    - docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
  script:
    - ./manage.sh build-backend-bundle
    - ./manage.sh build-backend-docker-image
    - docker tag penpotapp/backend:latest "$BACKEND_IMAGE:latest"
    - docker push "$BACKEND_IMAGE:latest"

# ==============================================================
bundle-exporter:
  stage: build-bundle
  image: docker:29
  tags: [penpotv4]
  before_script:
    - apk add --no-cache bash rsync
    - docker volume rm ${DEVENV_PNAME}_user_data || true
    - docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
  script:
    - ./manage.sh build-exporter-bundle
    - ./manage.sh build-exporter-docker-image
    - docker tag penpotapp/exporter:latest "$EXPORTER_IMAGE:latest"
    - docker push "$EXPORTER_IMAGE:latest"


#  =============================================================
trivy_image_scan:
  stage: scan-images
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  tags:
    - penpotv4
  variables:
    TRIVY_EXIT_CODE: "1"
  script:
    - mkdir -p trivy-image-reports
    - echo "Scan image frontend"
    - trivy image \
        --exit-code $TRIVY_EXIT_CODE \
        --severity HIGH,CRITICAL \
        --format json \
        --output trivy-image-reports/frontend_latest.json \
        $CI_REGISTRY_IMAGE/frontend:latest || true
    - echo "Scan image backend"
    - trivy image \
        --exit-code $TRIVY_EXIT_CODE \
        --severity HIGH,CRITICAL \
        --format json \
        --output trivy-image-reports/backend_latest.json \
        $CI_REGISTRY_IMAGE/backend:latest || true
    - echo "Scan image exporter"
    - trivy image \
        --exit-code $TRIVY_EXIT_CODE \
        --severity HIGH,CRITICAL \
        --format json \
        --output trivy-image-reports/exporter_latest.json \
        $CI_REGISTRY_IMAGE/exporter:latest || true
    - echo "Scan terminé (aucun impact sur la pipeline)"
    - exit 0
  artifacts:
    paths:
      - trivy-image-reports/
    expire_in: 1 week
