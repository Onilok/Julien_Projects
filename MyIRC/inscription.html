<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Inscription</title>
  </head>
  <body
    style="
      background-color: #f0f0f0;
      font-family: Arial, sans-serif;
      text-align: center;
    "
  >
    <h2 style="color: #333">Inscription</h2>

    <form
      id="form"
      action="/inscription"
      method="post"
      style="
        background-color: #fff;
        border: 1px solid #ccc;
        border-radius: 5px;
        padding: 20px;
        width: 300px;
        margin: 0 auto;
      "
    >
      <input
        id="username"
        type="text"
        name="username"
        style="
          width: 100%;
          padding: 10px;
          margin: 5px 0;
          border: 1px solid #ccc;
          border-radius: 3px;
        "
        placeholder="Nom d'utilisateur"
        required
      /><br />
      <input
        id="password"
        type="password"
        name="password"
        style="
          width: 100%;
          padding: 10px;
          margin: 5px 0;
          border: 1px solid #ccc;
          border-radius: 3px;
        "
        placeholder="Mot de passe"
        required
      /><br />
      <button
        style="
          background-color: #007bff;
          color: #fff;
          padding: 10px;
          border: none;
          border-radius: 3px;
          cursor: pointer;
        "
      >
        S'inscrire
      </button>
    </form>
  </body>
</html>
