services:
  traefik:
    image: traefik:v3.6.6
    container_name: traefik
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "9100:9100"
    volumes:
      - ./traefik.yml:/traefik.yml:ro
      - ./dynamic.yml:/dynamic.yml:ro
      - ./acme.json:/acme.json
    command:
      - "--configFile=/traefik.yml"
