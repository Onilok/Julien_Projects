---
# =========================================================
# K3s – Multi-master HA 
# =========================================================

- name: Ping k3s nodes via bastion
  ansible.builtin.ping:
  when: "'k3s_prd_masters' in group_names"
 
# ----------------------------------------------------
# Disable swap 
# ----------------------------------------------------

- name: Disable swap
  command: swapoff -a

- name: Comment swap entries in /etc/fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '# \1'

# ----------------------------------------------------
# K3S PART
# ----------------------------------------------------

- name: Install shell k3s-install.sh
  copy:
    src: k3s-install.sh
    dest: /home/admin/k3s-install.sh
    mode: '0755'
  when: inventory_hostname in groups['k3s_prd_masters']

- name: Exécuter le script k3s
  script: k3s-install.sh
  args:
    creates: /usr/local/bin/k3s
  when: inventory_hostname in groups['k3s_prd_masters']

- name: Copy K3s YML files for penpot services 
  become: false
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/home/admin/{{ item }}"
    owner: admin
    group: admin
    mode: '0640'
    force: false
  loop:
    - penpot-nodeport.yaml
    - penpot-helm-values.yml
  when: inventory_hostname in groups['k3s_prd_masters']

- name: Check if helm binary exists
  ansible.builtin.stat:
    path: /usr/local/bin/helm
  register: helm_stat

- name: Copy helm binary
  become: true
  ansible.builtin.copy:
    src: helm
    dest: /usr/local/bin/helm
    owner: root
    group: root
    mode: '0755'
  when: 
    - not helm_stat.stat.exists
    - inventory_hostname in groups['k3s_prd_masters']

- name: Fix zone eu-west-3a
  set_fact:
    k3s_zone: "3a"
  when: inventory_hostname in groups['k3s_prd_master_3a']
     or inventory_hostname in groups['k3s_prd_master_slave_3a']

- name: Définir la zone (zone2)
  set_fact:
    k3s_zone: "3b"
  when: inventory_hostname in groups['k3s_prd_master_3b']
     or inventory_hostname in groups['k3s_prd_master_slave_3b']

- name: Sauver l'IP du master K3s
  set_fact:
    k3s_master_ip: "{{ ansible_default_ipv4.address }}"
  when: inventory_hostname in groups['k3s_prd_masters']

- name: Read k3s token
  slurp:
    src: /var/lib/rancher/k3s/server/token
  register: k3s_server_node_token
  when: inventory_hostname in groups['k3s_prd_masters']

- name: Save k3s token
  set_fact:
    k3s_token: "{{ k3s_server_node_token.content | b64decode | regex_replace('\n', '') }}"
  when: inventory_hostname in groups['k3s_prd_masters']

- name: Debug master
  debug:
    msg: >
      Master {{ inventory_hostname }}
      | zone={{ k3s_zone }}
      | ip={{ k3s_master_ip }}
  when: inventory_hostname in groups['k3s_prd_masters']

- name: Définir le master de la zone
  set_fact:
    k3s_zone_master: "{{ groups['k3s_prd_master_' + k3s_zone][0] }}"
  when: inventory_hostname in groups['k3s_prd_masters_slave']

- name: Define master IP in zone
  set_fact:
    master_ip: "{{ hostvars[k3s_zone_master].k3s_master_ip }}"
  when: inventory_hostname in groups['k3s_prd_masters_slave']

- name: Debug mapping worker -> master
  debug:
    msg: >
      Worker {{ inventory_hostname }}
      | zone={{ k3s_zone }}
      | master={{ k3s_zone_master }}
      | ip={{ hostvars[k3s_zone_master].k3s_master_ip }}
  when: inventory_hostname in groups['k3s_prd_masters_slave']

- name: Get k3s token from zone master
  set_fact:
    k3s_token: "{{ hostvars[k3s_zone_master].k3s_token }}"
  when: inventory_hostname in groups['k3s_prd_masters_slave']

- name: Debug token source
  debug:
    msg: >
      Worker {{ inventory_hostname }}
      uses master {{ k3s_zone_master }}
      uses master ip {{ master_ip }}
      token_hash={{ k3s_token | hash('sha1') }}
  when: inventory_hostname in groups['k3s_prd_masters_slave']

- name: Install additional K3s master via etcd endpoint
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server \
      --server https://{{ master_ip }}:6443 \
      --token {{ k3s_token }} \
      --node-ip {{ ansible_default_ipv4.address }} \
      --advertise-address {{ ansible_default_ipv4.address }} \
      --tls-san {{ master_ip }}" sh -
  args:
    creates: /usr/local/bin/k3s
  become: yes
  when: inventory_hostname in groups['k3s_prd_masters_slave'] 

- name: Set K3S_KUBECONFIG_MODE in systemd environment file
  ansible.builtin.lineinfile:
    path: /etc/systemd/system/k3s.service.env
    line: "K3S_KUBECONFIG_MODE=644"
    create: yes
    state: present
    mode: '0600'


- name: Set permissions on k3s kubeconfig
  ansible.builtin.file:
    path: /etc/rancher/k3s/k3s.yaml
    mode: '0644'
